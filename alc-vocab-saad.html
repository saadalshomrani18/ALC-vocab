<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مفردات ALC — سعد الشمراني</title>
<meta property="og:title" content="مفردات ALC — سعد الشمراني">
<meta property="og:description" content="مفردات كتب ALC من Book 4 إلى Book 12 | كلية الملك عبدالعزيز الحربية">
<meta property="og:image" content="data:image/jpeg;base64,/9j/4RhJRXhpZgAASUkqAAgAAAAFABoBBQABAAAASgAAABsBBQABAAAAUgAAACgBAwABAAAAAgAAABMCAwABAAAAAQAAAGmHBAAB">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Noto Kufi Arabic', 'Cairo', 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(160deg,#0a1628 0%,#0e1f3a 60%,#071020 100%);
    color: #e8e0d0;
    min-height: 100vh;
    direction: rtl;
  }
  /* HEADER */
  .header {
    background: linear-gradient(90deg,#1a2940,#0d1f35);
    border-bottom: 3px solid #c8a84b;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo {
    width: 70px;
    height: 70px;
    object-fit: contain;
    border-radius: 50%;
    background: white;
    padding: 4px;
    flex-shrink: 0;
  }
  .header-text { flex: 1; text-align: center; }
  .header-sub { font-size: 10px; color: #c8a84b; letter-spacing: 2px; margin-bottom: 4px; }
  .header-title {
    font-size: clamp(16px,3.5vw,26px);
    font-weight: 800;
    background: linear-gradient(135deg,#c8a84b,#e8d07a,#c8a84b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 3px;
  }
  .header-desc { font-size: 11px; color: #7fb3c8; }
  /* SEARCH */
  .search-bar {
    padding: 10px 16px;
    background: #0d1f35;
    border-bottom: 1px solid #1e3050;
  }
  .search-bar input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid #2a4060;
    background: #162030;
    color: #e8e0d0;
    font-size: 14px;
    font-family: inherit;
    direction: rtl;
    outline: none;
  }
  .search-bar input:focus { border-color: #c8a84b; }
  .search-count { color:#7fb3c8; font-size:11px; margin-top:5px; text-align:center; }
  /* TABS */
  .tabs {
    display: flex;
    overflow-x: auto;
    gap: 6px;
    padding: 10px 16px;
    background: #0d1f35;
    border-bottom: 1px solid #1e3050;
    scrollbar-width: thin;
  }
  .tabs::-webkit-scrollbar { height:3px; }
  .tabs::-webkit-scrollbar-thumb { background:#2a4060; border-radius:2px; }
  .tab-btn {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    border: 1px solid #2a4060;
    background: #162030;
    color: #7fb3c8;
    font-family: inherit;
    font-size: 12px;
    transition: all .2s;
  }
  .tab-btn.active {
    border: 2px solid #c8a84b;
    background: rgba(200,168,75,.15);
    color: #c8a84b;
    font-weight: 700;
  }
  /* LESSON TABS */
  .lesson-tabs {
    display: flex;
    gap: 6px;
    padding: 8px 16px;
    background: #0f1923;
    border-bottom: 1px solid #1e3050;
    overflow-x: auto;
    flex-wrap: wrap;
  }
  .lesson-btn {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    border: 1px solid #2a4060;
    background: transparent;
    color: #5a8090;
    font-family: inherit;
    font-size: 11px;
    transition: all .2s;
  }
  .lesson-btn.active {
    border-color: #7fb3c8;
    background: rgba(127,179,200,.15);
    color: #7fb3c8;
  }
  /* INFO BAR */
  .info-bar {
    padding: 7px 16px;
    background: rgba(200,168,75,.06);
    border-bottom: 1px solid #1e3050;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
  }
  .info-bar span:first-child { color: #c8a84b; font-weight:700; }
  .info-bar span:last-child { color: #5a8090; font-size: 10px; }
  /* TABLE */
  .table-wrap {
    padding: 12px 16px;
  }
  .vocab-table {
    background: #0d1f35;
    border-radius: 12px;
    border: 1px solid #1e3050;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
    width: 100%;
  }
  .table-head {
    display: grid;
    grid-template-columns: 36px 180px 1fr 1fr;
    padding: 10px 14px;
    background: rgba(200,168,75,.1);
    border-bottom: 1px solid rgba(200,168,75,.3);
    gap: 8px;
  }
  .table-head span { color:#c8a84b; font-size:10px; font-weight:700; }
  .table-head .col-ar { text-align:center; }
  .table-head .col-def { text-align:right; direction:ltr; }
  .table-row {
    display: grid;
    grid-template-columns: 36px 180px 1fr 1fr;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,.04);
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: background .15s;
  }
  .table-row:last-child { border-bottom: none; }
  .table-row:nth-child(even) { background: rgba(255,255,255,.018); }
  .table-row:hover { background: rgba(200,168,75,.06); }
  .col-num { color:#3a6080; font-size:11px; }
  .col-word { color:#e8e0d0; font-size:14px; font-weight:700; }
  .col-ar-cell { color:#52b788; font-size:14px; text-align:center; direction:rtl; }
  .col-ar-cell.empty { color:#3a5060; }
  .col-def-cell {
    color:#3a6080; font-size:10px; text-align:right; direction:ltr;
    transition: color .2s;
  }
  .col-def-cell.revealed { color:#7fb3c8; }
  /* SEARCH RESULTS - 4 cols */
  .search-head {
    display: grid;
    grid-template-columns: 36px 180px 1fr 70px;
    padding: 10px 14px;
    background: rgba(200,168,75,.1);
    border-bottom: 1px solid rgba(200,168,75,.3);
    gap: 8px;
  }
  .search-head span { color:#c8a84b; font-size:10px; font-weight:700; }
  .search-row {
    display: grid;
    grid-template-columns: 36px 180px 1fr 70px;
    padding: 9px 14px;
    border-bottom: 1px solid rgba(255,255,255,.04);
    align-items: center;
    gap: 8px;
  }
  .search-row:nth-child(even) { background: rgba(255,255,255,.018); }
  .badge { color:#c8a84b; font-size:9px; text-align:right; direction:ltr; }
  /* FOOTER */
  .footer {
    padding: 12px 16px;
    border-top: 1px solid #1e3050;
    text-align: center;
    color: #2a4a60;
    font-size: 9px;
  }
  .hint { text-align:center; margin-top:8px; color:#3a6080; font-size:10px; }
  @media(max-width:600px){
    .table-head, .table-row { grid-template-columns: 30px 1fr 1fr; }
    .table-head .col-def, .col-def-cell { display:none; }
    .search-head, .search-row { grid-template-columns: 30px 1fr 1fr; }
    .badge { display:none; }
  }
</style>
</head>

ice","a":"يَتَدَرَّب / يَتَمَرَّن","d":"to do something many time to become good at it"},{"w":"prepare","a":"يَتَحَضَّر / يُجَهِّز","d":"to get ready for some activity"},{"w":"shoot","a":"يُطْلِق النَّار","d":"to fire a weapon; to hit something with a bullet"},{"w":"used to","a":"كَانَ يَفْعَل (عَادَة مَاضِيَة)","d":"something done in the past that is not done now"},{"w":"would","a":"كَانَ يَفْعَل (مَاضٍ مُعْتَاد)","d":"something done as a habit in the past"},{"w":"all over","a":"فِي كُلّ مَكَان","d":"(everywhere)"},{"w":"farther","a":"أَبْعَد","d":"at a greater distance"},{"w":"further","a":"أَبْعَد / إِضَافِيّ","d":"at a greater distance or at a later time"},{"w":"hard","a":"صَعْب / قَاسٍ","d":"with great effort or force"},{"w":"high","a":"عَالٍ / مُرْتَفِع","d":"above a set point"},{"w":"indoors","a":"دَاخِل الْمَبْنَى","d":"inside a building"},{"w":"low","a":"مُنْخَفِض","d":"below a set point"},{"w":"more","a":"أَكْثَر","d":"a greater number or amount"},{"w":"once","a":"مَرَّة وَاحِدَة","d":"one time; at a time before now"},{"w":"out-of-doors","a":"خَارِج","d":"outside a building"},{"w":"outdoors","a":"خَارِج / فِي الْهَوَاء الطَّلْق","d":"outside a building"},{"w":"own","a":"خَاصّ / يَمْلِك","d":"belonging to someone"},{"w":"several","a":"عِدَّة","d":"more than two but not a lot"},{"w":"slow","a":"بَطِيء","d":"opposite of fast"},{"w":"twice","a":"مَرَّتَيْن","d":"two times"},{"w":"whole","a":"كُلّ / كَامِل","d":"ective: all of; entire"},{"w":"country","a":"رِيف / دَوْلَة","d":"area outside of the city; often meaning the farm area"},{"w":"deer / deer","a":"غَزَال / أَيَّل","d":"an animal similar to an oryx (gazelle)"},{"w":"duck","a":"بَطَّة","d":"a bird that swims on the water"},{"w":"fish / fish","a":"","d":"animals that live in the water"},{"w":"fishing rod","a":"قَضِيب صَيْد","d":"pole used to catch fish"},{"w":"gun","a":"بُنْدُقِيَّة / مِسْدَس","d":"weapon with a long tube (barrel)"},{"w":"instructions","a":"تَعْلِيمَات","d":"directions for how to do something"},{"w":"line","a":"خَطّ / صَفّ","d":"string; cord"},{"w":"outdoors","a":"خَارِج / فِي الْهَوَاء الطَّلْق","d":"outside"},{"w":"own","a":"خَاصّ / يَمْلِك","d":"belonging to a person"},{"w":"pistol","a":"مِسْدَس","d":"shooting weapon held in the hand"},{"w":"plenty","a":"وَفِير / كَثِير","d":"enough or more than enough"},{"w":"rifle","a":"بُنْدُقِيَّة","d":"a long gun"},{"w":"shot","a":"طَلَقَة","d":"sound of a gun or pistol firing; the name of the action of shooting"},{"w":"walk","a":"مَشْيَة / نَزْهَة","d":"a short trip on foot"},{"w":"weapon","a":"سِلَاح","d":"a tool for killing or harming"},{"w":"in the open","a":"فِي الْعَرَاء","d":"outside; in clear view, easy to see"}]}};
const TOPICS = {"book4": {"L1": "Sports & Cities", "L2": "Military Ranks", "L3": "Clothes & Modals", "L4": "Colors & Seasons"}, "book5": {"L1": "Body Parts", "L2": "Personal Care", "L3": "Travel & Airport", "L4": "Food & Measures"}, "book6": {"L1": "Weather", "L2": "Transportation", "L3": "Mail & Bank", "L4": "Hotels & Vacation"}, "book7": {"L1": "Shapes & Math", "L2": "Numbers & Pos", "L3": "Nature & Home", "L4": "Furniture"}, "book8": {"L1": "Directions", "L2": "Sports & Exercise", "L3": "Telephone", "L4": "Apartments"}, "book9": {"L1": "Banking", "L2": "Traffic", "L3": "Advice & Feelings", "L4": "Travel"}, "book10": {"L1": "Vending Machines", "L2": "Shopping", "L3": "Car Maintenance", "L4": "Family"}, "book11": {"L1": "Medical", "L2": "Driving", "L3": "Car Repairs", "L4": "Entertainment"}, "book12": {"L1": "Weather", "L2": "Education", "L3": "Home Improvements", "L4": "Outdoors"}};
const BOOKS = ["book4","book5","book6","book7","book8","book9","book10","book11","book12"];

let activeBook = "book4";
let activeLesson = "L1";
let flipped = {};
let searchMode = false;

function init() {
  renderBookTabs();
  renderLessonTabs();
  renderTable();
  updateInfo();
}

function renderBookTabs() {
  const c = document.getElementById('bookTabs');
  c.innerHTML = BOOKS.map(bk => `
    <button class="tab-btn ${bk===activeBook?'active':''}" onclick="switchBook('${bk}')">${bk.replace('book','Book ')}</button>
  `).join('');
}

function renderLessonTabs() {
  const bk = DATA[activeBook] || {};
  const lessons = Object.keys(bk);
  const c = document.getElementById('lessonTabs');
  c.innerHTML = lessons.map(ls => `
    <button class="lesson-btn ${ls===activeLesson?'active':''}"
      onclick="switchLesson('${ls}')">${ls} — ${(TOPICS[activeBook]||{})[ls]||''}</button>
  `).join('');
}

function updateInfo() {
  const bk = DATA[activeBook] || {};
  const total = Object.values(bk).reduce((s,a)=>s+a.length,0);
  const cur = (bk[activeLesson]||[]).length;
  document.getElementById('infoTitle').textContent = `📚 ${activeBook.replace('book','Book ')} — إجمالي: ${total} كلمة`;
  document.getElementById('infoCount').textContent = `${cur} كلمة في هذا الدرس`;
}

function renderTable() {
  const words = (DATA[activeBook]||{})[activeLesson] || [];
  const t = document.getElementById('vocabTable');
  if (!words.length) { t.innerHTML = '<div style="padding:30px;text-align:center;color:#3a6080">لا توجد كلمات</div>'; return; }
  t.innerHTML = `
    <div class="table-head">
      <span>#</span>
      <span>الكلمة</span>
      <span class="col-ar">المعنى بالعربي</span>
      <span class="col-def">التعريف الإنجليزي</span>
    </div>
    ${words.map((w,i)=>`
      <div class="table-row" onclick="flipRow(${i})">
        <span class="col-num">${i+1}</span>
        <span class="col-word">${esc(w.w)}</span>
        <span class="col-ar-cell ${w.a?'':'empty'}">${w.a||'—'}</span>
        <span class="col-def-cell" id="def_${i}">${flipped[i]?(w.d||'—'):'tap for definition'}</span>
      </div>
    `).join('')}
  `;
}

function flipRow(i) {
  flipped[i] = !flipped[i];
  const el = document.getElementById('def_'+i);
  if (!el) return;
  const words = (DATA[activeBook]||{})[activeLesson] || [];
  el.textContent = flipped[i] ? (words[i]?.d||'—') : 'tap for definition';
  el.className = 'col-def-cell' + (flipped[i]?' revealed':'');
}

function switchBook(bk) {
  activeBook = bk;
  const lessons = Object.keys(DATA[bk]||{});
  activeLesson = lessons[0] || 'L1';
  flipped = {};
  renderBookTabs();
  renderLessonTabs();
  renderTable();
  updateInfo();
}

function switchLesson(ls) {
  activeLesson = ls;
  flipped = {};
  renderLessonTabs();
  renderTable();
  updateInfo();
}

function doSearch(q) {
  const trim = q.trim();
  const tabs = document.getElementById('bookTabs');
  const lessons = document.getElementById('lessonTabs');
  const info = document.getElementById('infoBar');
  const hint = document.getElementById('hint');
  const sc = document.getElementById('searchCount');
  const t = document.getElementById('vocabTable');

  if (!trim) {
    tabs.style.display='flex'; lessons.style.display='flex';
    info.style.display='flex'; hint.style.display='block';
    sc.style.display='none';
    renderTable();
    return;
  }
  tabs.style.display='none'; lessons.style.display='none';
  info.style.display='none'; hint.style.display='none';
  sc.style.display='block';

  const ql = trim.toLowerCase();
  const results = [];
  for (const bk of BOOKS) {
    for (const [ls, ws] of Object.entries(DATA[bk]||{})) {
      for (const w of ws) {
        if (w.w.toLowerCase().includes(ql) || w.a.includes(trim)) {
          results.push({...w, _bk: bk, _ls: ls});
        }
      }
    }
  }
  sc.textContent = results.length + ' نتيجة في جميع الكتب';

  if (!results.length) {
    t.innerHTML = '<div style="padding:30px;text-align:center;color:#3a6080">لا توجد نتائج</div>';
    return;
  }
  t.innerHTML = `
    <div class="search-head">
      <span>#</span><span>الكلمة</span><span>المعنى بالعربي</span><span>المصدر</span>
    </div>
    ${results.slice(0,200).map((w,i)=>`
      <div class="search-row">
        <span class="col-num">${i+1}</span>
        <span class="col-word">${esc(w.w)}</span>
        <span class="col-ar-cell ${w.a?'':'empty'}">${w.a||'—'}</span>
        <span class="badge">${w._bk.replace('book','B')} ${w._ls}</span>
      </div>
    `).join('')}
  `;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
</script>
</body>
</html>
